  <g transform="translate(170 160)">
    <rect x="0" y="0" width="760" height="470" fill="#1C130D" fill-opacity="0.54" stroke="#C8A36D" stroke-opacity="0.4"/>
    <rect x="18" y="18" width="724" height="434" fill="none" stroke="#C8A36D" stroke-opacity="0.22"/>
