    <path d="M90 735C230 704 313 712 420 739" stroke="#6E5034" stroke-width="4"/>
    <path d="M240 785C386 751 470 760 597 792" stroke="#6E5034" stroke-width="4"/>
    <path d="M470 734C634 700 745 705 910 742" stroke="#6E5034" stroke-width="4"/>
    <path d="M740 786C900 753 1010 760 1180 796" stroke="#6E5034" stroke-width="4"/>
    <path d="M1000 736C1168 700 1285 710 1454 745" stroke="#6E5034" stroke-width="4"/>
    <path d="M1240 790C1422 757 1539 764 1722 798" stroke="#6E5034" stroke-width="4"/>
  </g>

  <g opacity="0.35">
