    <path d="M120 858H1810" stroke="url(#goldLine)" stroke-width="1.5"/>
    <path d="M120 891H1810" stroke="url(#goldLine)" stroke-width="1.5"/>
  </g>

  <g transform="translate(1120 560)">
    <ellipse cx="330" cy="340" rx="250" ry="56" fill="#000000" opacity="0.18" filter="url(#softShadow)"/>

    <rect x="180" y="228" width="10" height="180" rx="5" fill="#C9A26F"/>
    <rect x="470" y="228" width="10" height="180" rx="5" fill="#C9A26F"/>
    <rect x="325" y="182" width="10" height="180" rx="5" transform="rotate(90 325 182)" fill="#C9A26F"/>

    <ellipse cx="330" cy="276" rx="150" ry="43" fill="#F0E6D6"/>
    <ellipse cx="330" cy="271" rx="133" ry="33" fill="#E3D2BA"/>
    <ellipse cx="330" cy="268" rx="116" ry="24" fill="#7A2F22"/>

    <path d="M290 260C310 246 348 246 367 260C349 274 308 274 290 260Z" fill="#C48A5B" opacity="0.82"/>
    <circle cx="321" cy="257" r="6" fill="#F8D2A3" opacity="0.72"/>
    <circle cx="351" cy="262" r="5" fill="#F8D2A3" opacity="0.62"/>

    <path d="M246 215C250 199 264 191 279 194C269 205 260 213 246 215Z" fill="#8DA06D"/>
    <path d="M255 220C267 207 281 208 293 217C281 223 269 224 255 220Z" fill="#A4B985"/>

