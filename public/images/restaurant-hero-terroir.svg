<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hero Restaurant Les Carillons</title>
  <desc id="desc">Illustration elegante terroir avec collines, vignobles stylises et table gastronomique.</desc>

  <defs>
    <linearGradient id="sky" x1="960" y1="0" x2="960" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#201710"/>
      <stop offset="0.55" stop-color="#3A2819"/>
      <stop offset="1" stop-color="#5C3E28"/>
    </linearGradient>

    <linearGradient id="ground" x1="960" y1="620" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A3324"/>
      <stop offset="1" stop-color="#24180F"/>
    </linearGradient>

    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B28B57" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D5B17A"/>
      <stop offset="1" stop-color="#B28B57" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1430 250) rotate(90) scale(350 350)">
      <stop offset="0" stop-color="#D7B07D" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D7B07D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="vignette" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0.36"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.58"/>
    </linearGradient>

    <filter id="softNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sunGlow)"/>

  <path d="M0 670C190 615 324 638 495 674C677 713 788 701 936 660C1116 610 1250 618 1424 666C1602 716 1748 719 1920 680V1080H0V670Z" fill="#3A291D"/>
  <path d="M0 715C216 646 355 670 530 708C705 747 843 752 1009 705C1170 658 1328 653 1503 699C1664 740 1767 741 1920 711V1080H0V715Z" fill="url(#ground)"/>

