<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hero Hotel Les Carillons</title>
  <desc id="desc">Illustration elegante d'un hotel de campagne avec parc, piscine et ambiance coucher de soleil.</desc>

  <defs>
    <linearGradient id="sky" x1="960" y1="0" x2="960" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1D2D"/>
      <stop offset="0.42" stop-color="#304564"/>
      <stop offset="0.74" stop-color="#6A5C52"/>
      <stop offset="1" stop-color="#9B7A5E"/>
    </linearGradient>

    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1430 290) rotate(90) scale(340)">
      <stop offset="0" stop-color="#FFD9A7" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFD9A7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hill1" x1="960" y1="620" x2="960" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5A5D47"/>
      <stop offset="1" stop-color="#3A3E2F"/>
    </linearGradient>

    <linearGradient id="hill2" x1="960" y1="700" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3B2E"/>
      <stop offset="1" stop-color="#252218"/>
    </linearGradient>

    <linearGradient id="pool" x1="960" y1="760" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7AB1BE"/>
      <stop offset="1" stop-color="#2D5666"/>
    </linearGradient>

    <linearGradient id="vignette" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.56"/>
    </linearGradient>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>

